<!DOCTYPE html>
<html lang="en">

<head>

    <title>Registration Form</title>

</head>

<body>

    <form id="registerForm">

        <input type="text"
               name="username"
               placeholder="Enter Name">

        <span id="nameError"></span>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Enter Email">

        <span id="emailError"></span>

        <br><br>

        <select name="event">

            <option>
                Music Festival
            </option>

            <option>
                Food Workshop
            </option>

        </select>

        <br><br>

        <button type="submit">

            Register

        </button>

    </form>

    <script src="main.js"></script>

</body>

</html>
